<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Quiz</title>
    <link rel="stylesheet" href="javascript.css">
</head>
<body>

  
<div class="container">

    <!-- Welcome Screen -->
    <div id="welcomeScreen">
        <h1>Interactive Quiz </h1>
        <p>Test your JavaScript basics.</p>
        <p><strong>Total Questions: 10</strong></p>
        <button id="startBtn">Start Quiz</button> <br><br>
        <div class="deadline">
            <marquee behavior="scroll" direction="left" scrollamount="6">
                <strong> Deadline Quiz Date: 01-07-2026 |  Time: 6:00 PM</strong>
            </marquee>
        </div>
    </div>

    

    <!-- Quiz Screen -->
    <div id="quizScreen" class="hide">

        <h2 id="progress"></h2>

        <div class="progressBar">
            <div id="bar"></div>
        </div>

        <h3 id="question"></h3>

        <div id="options"></div>

        <div class="buttons">
            <button id="prevBtn">Previous</button>
            <button id="nextBtn">Next</button>
            <button id="submitBtn" class="hide">Submit Quiz</button>
        </div>

    </div>

    

    <!-- Result Screen -->
<div id="resultScreen" class="hide">

    <div class="result-header">
        <h2>Quiz Completed!</h2>
        <p>Congratulations! Here are your results.</p>
    </div>

    <div class="score-circle">
        <h1 id="percentage">0%</h1>
        <span>Your Score</span>
    </div>

    <div class="result-cards">

        <div class="card green">
            <h3 id="correct">0</h3>
            <p>Correct</p>
        </div>

        <div class="card red">
            <h3 id="wrong">0</h3>
            <p>Wrong</p>
        </div>

        <div class="card blue">
            <h3 id="score">0/10</h3>
            <p>Total Score</p>
        </div>

    </div>

    <h3 id="message"></h3>

    <p id="highestScore"></p>

    <button id="restartBtn">Restart Quiz</button>

</div>

</div>

<script src="javascript.js"></script>

</body>
</html>
