    <script>
        //switch
        let month = prompt("Enter a month name:");
;

        switch (month) {
            case "March":
            case "April":
            case "May":
            case "June":
                console.log("Summer Season");
                break;

            case "July":
            case "August":
            case "September":

            case "December":
            case "January":
            case "February":

                break;

            default:
                console.log("Invalid Month");
        }
    </script>
