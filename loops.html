<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loops</title>
</head>
<body>
    

    <script>
        // Task 1: Student Attendance System
        // Using for...of loop

        let students = ["Ravi", "Priya", "Kiran", "Anu"];

        for (let student of students) {
            console.log("Attendance Marked for " + student);
        }


        // Task 2: Online Shopping Products
        // Using forEach loop

        let products = ["Laptop", "Mouse", "Keyboard", "Monitor"];

        products.forEach(function (product) {
            console.log("Available Product: " + product);
        });



        // Task 3: Employee Welcome Messages
        // Using for loop

        let employees = ["John", "David", "Sara"];

        for (let i = 0; i < employees.length; i++) {
            console.log("Welcome " + employees[i]);
        }


        // Task 4: Movie Ticket Booking
        // Using for loop
       

        for (let seat = 1; seat <= 10; seat++) {
            console.log("Seat " + seat + " Booked");
        }


       
        // Task 5: Food Delivery Orders
        // Using for...of loop
    

        let orders = ["Order101", "Order102", "Order103"];

        for (let order of orders) {
            console.log("Delivering " + order);
        }


        
        // Task 6: Mobile Contacts
        // Using forEach loop
    

        let contacts = ["Rahul", "Priya", "Arjun", "Neha"];

        contacts.forEach(function (contact) {
            console.log("Calling " + contact);
        });


       
        // Task 7: WhatsApp Broadcast
        // Using for...of loop
        
        let users = ["Ravi", "Kiran", "Anu"];

        for (let user of users) {
            console.log("Message Sent to " + user);
        }


       
        // Task 8: YouTube Playlist
        // Using for loop
        
        let videos = ["HTML Basics", "CSS Basics", "JavaScript Basics"];

        for (let i = 0; i < videos.length; i++) {
            console.log("Now Playing: " + videos[i]);
        }


       
        // Task 9: ATM Withdrawal System
        // Using while loop
       
        let balance = 1000;

        while (balance > 0) {
            console.log("Balance: " + balance);
            balance -= 200;
        }


       
        // Task 10: Bus Journey Tracker
        // Using while loop
        

        let stop = 1;

        while (stop <= 5) {
            console.log("Reached Stop " + stop);
            stop++;
        }


        
        // Challenge Task 1: Student Result Processing
        // Using for...of loop
        

        let studentList = ["Ravi", "Priya", "Kiran", "Anu"];

        for (let student of studentList) {
            console.log("Checking Result for " + student);
        }

        console.log("All Results Published Successfully");


        
        // Challenge Task 2: Roll Number Classification
        // Using for loop
       

        let start = Number(prompt("Enter starting roll number:"));
        let end = Number(prompt("Enter ending roll number:"));

        for (let roll = start; roll <= end; roll++) {

            if (roll % 2 === 0) {
                console.log("Student " + roll + " - Even Roll Number");
            } else {
                console.log("Student " + roll + " - Odd Roll Number");
            }

        }


       
        //  Task 1 using another loop (for loop)
       

        for (let i = 0; i < students.length; i++) {
            console.log("Attendance Marked for " + students[i]);
        }


    
        // Task 5 using while loop
        

        let index = 0;

        while (index < orders.length) {
            console.log("Delivering " + orders[index]);
            index++;
        }
    </script>
</body>
</html>
